name: CI Validation Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint Check
        run: npm run lint

      - name: Production Build Check
        run: npm run build
        env:
          # Mock environment variables for build safety
          DATABASE_URI: postgres://postgres@localhost:5432/payload
          PAYLOAD_SECRET: ci_secret
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: framehouse-hub:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
